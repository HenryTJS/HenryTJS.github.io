<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seal的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="main-nav-bar" id="mainNavBar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">S</span>
                <span>seal</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="active"><i class="fas fa-home"></i><span>首页</span></a></li>
                <li><a href="/article"><i class="fas fa-book"></i><span>阅读</span></a></li>
                <li><a href="/trip"><i class="fas fa-map-marker-alt"></i><span>足迹</span></a></li>
                <li><a href="/information"><i class="fas fa-link"></i><span>链接</span></a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero-section" id="hero">
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-graduation-cap"></i>
                西安交通大学 · 钱学森班
            </div>
            <h1 class="hero-title">seal的个人主页</h1>
            <p class="hero-subtitle">西安交通大学少年班学生 | 智能制造工程（钱学森班-计算机）在读</p>
        </div>
        <div class="scroll-down" id="scrollDown">
            <i class="fas fa-angle-down"></i>
        </div>
    </section>

    <!-- 主内容 -->
    <div class="container">
        <div class="left-column">
            <section class="profile-section reveal" id="profile"></section>
            <section class="contact-section reveal" id="contact"></section>
        </div>
        <div class="right-column">
            <section class="achievements-section reveal">
                <div class="tab-container">
                    <button class="tab active" onclick="openTab(event, 'achievements')">个人成就</button>
                    <button class="tab" onclick="openTab(event, 'experience')">个人履历</button>
                </div>
                <div id="achievements" class="tab-content active"></div>
                <div id="experience" class="tab-content"></div>
            </section>
            <section class="apps-section reveal" id="apps"></section>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <p>© 2025 seal的个人主页. 保留所有权利.</p>
            <div class="footer-links">
                <a href="https://github.com/HenryTJS" target="_blank" rel="noopener"><i class="fab fa-github"></i> GitHub</a>
                <a href="mailto:2223510297@stu.xjtu.edu.cn"><i class="fas fa-envelope"></i> 邮件</a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
