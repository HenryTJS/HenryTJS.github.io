<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足迹地图 - seal的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.8&key=abfc6c7f01853605691562a41f0b966a"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="main-nav-bar" id="mainNavBar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">S</span>
                <span>seal</span>
            </a>
            <ul class="nav-links">
                <li><a href="/"><i class="fas fa-home"></i><span>首页</span></a></li>
                <li><a href="/article"><i class="fas fa-book"></i><span>阅读</span></a></li>
                <li><a href="/trip" class="active"><i class="fas fa-map-marker-alt"></i><span>足迹</span></a></li>
                <li><a href="/information"><i class="fas fa-link"></i><span>链接</span></a></li>
            </ul>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-map-marked-alt" style="color: var(--color-accent); margin-right: 10px;"></i>足迹地图</h1>
            <p>记录我到过的每一个城市</p>
        </header>

        <div class="main-content">
            <div id="mapContainer"></div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-number" id="totalCities">0</span>
                    <span class="stat-label">已访问城市</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalProvinces">0</span>
                    <span class="stat-label">已访问省份</span>
                </div>
            </div>

            <div class="control-panel">
                <h3>我的足迹</h3>
                <div id="footprintList" class="footprint-list"></div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <p>© 2025 seal的个人主页. 保留所有权利.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
